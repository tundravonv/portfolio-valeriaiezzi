<?xml version="1.0" encoding="UTF-8"?>
<!-- Project page mobile: IKEA — Master Material Library -->
<svg width="390" height="5200" viewBox="0 0 390 5200"
     xmlns="http://www.w3.org/2000/svg"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <rect width="390" height="5200" fill="#FFFFFF"/>

  <!-- ── TOP BAR ─────────────────────────────────────────── -->
  <text x="24" y="36" font-size="11.5" fill="#555555">← Back to homepage</text>
  <text x="366" y="36" font-size="11.5" fill="#555555" text-anchor="end">Valeria Iezzi ©2026</text>

  <!-- ── TITLE BLOCK ─────────────────────────────────────── -->
  <text x="195" y="92" font-size="26" font-weight="700" fill="#1a1a1a" text-anchor="middle" letter-spacing="-0.5">Master Material</text>
  <text x="195" y="124" font-size="26" font-weight="700" fill="#1a1a1a" text-anchor="middle" letter-spacing="-0.5">Library</text>

  <!-- Tags (centred, 2 rows) -->
  <rect x="63" y="140" width="92" height="22" rx="11" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="109" y="155" font-size="11" font-weight="500" fill="#6D28D9" text-anchor="middle">UX research</text>
  <rect x="163" y="140" width="76" height="22" rx="11" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="201" y="155" font-size="11" font-weight="500" fill="#6D28D9" text-anchor="middle">UI Design</text>
  <rect x="63" y="169" width="103" height="22" rx="11" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="114" y="184" font-size="11" font-weight="500" fill="#92400E" text-anchor="middle">Design System</text>
  <rect x="174" y="169" width="104" height="22" rx="11" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="1"/>
  <text x="226" y="184" font-size="11" font-weight="500" fill="#BE185D" text-anchor="middle">Service Design</text>

  <!-- ── HERO IMAGE ──────────────────────────────────────── -->
  <rect x="24" y="208" width="342" height="220" rx="14" fill="#E2E8EE"/>
  <text x="195" y="314" font-size="12" fill="#9AAFBF" text-anchor="middle">Hero image placeholder</text>
  <text x="195" y="332" font-size="9.5" fill="#B8C9D4" text-anchor="middle">/public/images/ikea-card.png</text>

  <!-- ── INFO TABLE ──────────────────────────────────────── -->
  <line x1="24" y1="448" x2="366" y2="448" stroke="#E5E5E5" stroke-width="1"/>
  <line x1="24" y1="596" x2="366" y2="596" stroke="#E5E5E5" stroke-width="1"/>

  <!-- Row 1: Client + Role -->
  <text x="24" y="468" font-size="9.5" font-weight="600" fill="#AAAAAA" letter-spacing="0.8">CLIENT</text>
  <rect x="24" y="478" width="44" height="22" rx="3" fill="#0051BA"/>
  <text x="46" y="493" font-size="10.5" font-weight="900" fill="#FFCC00" text-anchor="middle">IKEA</text>

  <text x="136" y="468" font-size="9.5" font-weight="600" fill="#AAAAAA" letter-spacing="0.8">ROLE</text>
  <text x="136" y="488" font-size="12" fill="#1a1a1a">Lead UX Designer</text>

  <text x="248" y="468" font-size="9.5" font-weight="600" fill="#AAAAAA" letter-spacing="0.8">DURATION</text>
  <text x="248" y="488" font-size="12" fill="#1a1a1a">2022 — 2023</text>

  <!-- Row 2: Responsibilities -->
  <text x="24" y="518" font-size="9.5" font-weight="600" fill="#AAAAAA" letter-spacing="0.8">RESPONSIBILITIES</text>
  <text font-size="11.5" fill="#1a1a1a">
    <tspan x="24" y="534">User research · Strategy &amp; roadmapping</tspan>
    <tspan x="24" dy="17">Design system · Interaction design</tspan>
    <tspan x="24" dy="17">Wireframing · User testing</tspan>
  </text>

  <!-- Tools -->
  <text x="248" y="518" font-size="9.5" font-weight="600" fill="#AAAAAA" letter-spacing="0.8">TOOLS</text>
  <text font-size="11.5" fill="#1a1a1a">
    <tspan x="248" y="534">Figma</tspan>
    <tspan x="248" dy="17">Miro</tspan>
    <tspan x="248" dy="17">Confluence</tspan>
  </text>

  <!-- ── PROJECT GOAL ────────────────────────────────────── -->
  <text x="24" y="644" font-size="18" font-weight="700" fill="#1a1a1a">Project goal</text>
  <text font-size="13.5" fill="#555555">
    <tspan x="24" y="672">Redesign and transformation of IKEA's material</tspan>
    <tspan x="24" dy="21">management system into a scalable platform improving</tspan>
    <tspan x="24" dy="21">UX, workflows and material management.</tspan>
  </text>

  <!-- ── PROCESS ────────────────────────────────────────── -->
  <text x="24" y="768" font-size="18" font-weight="700" fill="#1a1a1a">Process</text>

  <!-- User Research -->
  <text x="24" y="802" font-size="14" font-weight="600" fill="#1a1a1a">User Research &amp; Insights</text>
  <text font-size="13" fill="#555555">
    <tspan x="24" y="824">Research was conducted through user interviews,</tspan>
    <tspan x="24" dy="20">contextual enquiries and analysis across all user</tspan>
    <tspan x="24" dy="20">groups. Key findings highlighted the complexity of the</tspan>
    <tspan x="24" dy="20">existing information architecture and unclear navigation.</tspan>
  </text>
  <rect x="24" y="912" width="342" height="200" rx="12" fill="#F0F4F8" stroke="#E2E8EE" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="195" y="1008" font-size="11" fill="#9AAFBF" text-anchor="middle">Research image</text>
  <text x="195" y="1026" font-size="9.5" fill="#B8C9D4" text-anchor="middle">Add to /public/images/ikea-.../</text>

  <!-- Analysis -->
  <text x="24" y="1156" font-size="14" font-weight="600" fill="#1a1a1a">Analysis &amp; definition</text>
  <text font-size="13" fill="#555555">
    <tspan x="24" y="1178">Based on the research findings, we defined information</tspan>
    <tspan x="24" dy="20">architecture improvements, identifying strategic gaps,</tspan>
    <tspan x="24" dy="20">content modelling and taxonomy refinement.</tspan>
  </text>
  <rect x="24" y="1250" width="342" height="200" rx="12" fill="#F0F4F8" stroke="#E2E8EE" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="195" y="1346" font-size="11" fill="#9AAFBF" text-anchor="middle">Analysis image</text>

  <!-- Key User Flows -->
  <text x="24" y="1494" font-size="14" font-weight="600" fill="#1a1a1a">Key User Flows</text>
  <text font-size="13" fill="#555555">
    <tspan x="24" y="1516">Three main flows were designed and tested:</tspan>
    <tspan x="24" dy="20">1. Explore Materials Plus</tspan>
    <tspan x="24" dy="20">2. Request New Material Flow</tspan>
    <tspan x="24" dy="20">3. Create &amp; Manage Materials Flow</tspan>
  </text>
  <rect x="24" y="1594" width="342" height="200" rx="12" fill="#F0F4F8" stroke="#E2E8EE" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="195" y="1690" font-size="11" fill="#9AAFBF" text-anchor="middle">User flows image</text>

  <!-- Validation -->
  <text x="24" y="1838" font-size="14" font-weight="600" fill="#1a1a1a">Validation &amp; Iteration</text>
  <text font-size="13" fill="#555555">
    <tspan x="24" y="1860">Each design iteration was validated through usability</tspan>
    <tspan x="24" dy="20">testing and stakeholder feedback sessions. Findings</tspan>
    <tspan x="24" dy="20">were used to refine the interface between rounds.</tspan>
  </text>
  <rect x="24" y="1926" width="342" height="200" rx="12" fill="#F0F4F8" stroke="#E2E8EE" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="195" y="2022" font-size="11" fill="#9AAFBF" text-anchor="middle">Validation image</text>

  <!-- ── FINAL SOLUTION ──────────────────────────────────── -->
  <text x="24" y="2170" font-size="18" font-weight="700" fill="#1a1a1a">Final solution</text>

  <!-- Solution 1 -->
  <rect x="24" y="2192" width="342" height="240" rx="12" fill="#F0F4F8" stroke="#E2E8EE" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="195" y="2308" font-size="11" fill="#9AAFBF" text-anchor="middle">Solution screen 1</text>
  <text font-size="12" fill="#555555">
    <tspan x="24" y="2452"><tspan font-weight="600" fill="#1a1a1a">1</tspan> — Home — templates for quick navigation,</tspan>
    <tspan x="24" dy="18">filters and previews ensuring flow efficiency.</tspan>
  </text>

  <!-- Solution 2 -->
  <rect x="24" y="2494" width="342" height="240" rx="12" fill="#F0F4F8" stroke="#E2E8EE" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="195" y="2610" font-size="11" fill="#9AAFBF" text-anchor="middle">Solution screen 2</text>
  <text font-size="12" fill="#555555">
    <tspan x="24" y="2754"><tspan font-weight="600" fill="#1a1a1a">2</tspan> — List result — detailed list providing</tspan>
    <tspan x="24" dy="18">properties, filters and logistic information.</tspan>
  </text>

  <!-- Solution 3 -->
  <rect x="24" y="2796" width="342" height="240" rx="12" fill="#F0F4F8" stroke="#E2E8EE" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="195" y="2912" font-size="11" fill="#9AAFBF" text-anchor="middle">Solution screen 3</text>
  <text font-size="12" fill="#555555">
    <tspan x="24" y="3056"><tspan font-weight="600" fill="#1a1a1a">3</tspan> — Article and content listing page.</tspan>
  </text>

  <!-- Solution 4 -->
  <rect x="24" y="3080" width="342" height="240" rx="12" fill="#F0F4F8" stroke="#E2E8EE" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="195" y="3196" font-size="11" fill="#9AAFBF" text-anchor="middle">Solution screen 4</text>
  <text font-size="12" fill="#555555">
    <tspan x="24" y="3340"><tspan font-weight="600" fill="#1a1a1a">4</tspan> — Detail — improved catalogue structure.</tspan>
  </text>

  <!-- Solution 5 -->
  <rect x="24" y="3364" width="342" height="240" rx="12" fill="#F0F4F8" stroke="#E2E8EE" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="195" y="3480" font-size="11" fill="#9AAFBF" text-anchor="middle">Solution screen 5</text>
  <text font-size="12" fill="#555555">
    <tspan x="24" y="3624"><tspan font-weight="600" fill="#1a1a1a">5</tspan> — Show page — new intelligence process in MMS.</tspan>
  </text>

  <!-- ── OUTCOME ─────────────────────────────────────────── -->
  <text x="24" y="3680" font-size="18" font-weight="700" fill="#1a1a1a">Outcome</text>
  <text font-size="13.5" fill="#555555">
    <tspan x="24" y="3706">The redesigned platform improved how IKEA teams</tspan>
    <tspan x="24" dy="21">access, manage and collaborate around material data.</tspan>
  </text>

  <!-- Outcome bullets -->
  <circle cx="32" cy="3748" r="3" fill="#7B2FBE"/>
  <text x="44" y="3753" font-size="13" fill="#555555">Adoption increased significantly</text>
  <circle cx="32" cy="3774" r="3" fill="#7B2FBE"/>
  <text x="44" y="3779" font-size="13" fill="#555555">Team efficiency improved</text>
  <circle cx="32" cy="3800" r="3" fill="#7B2FBE"/>
  <text x="44" y="3805" font-size="13" fill="#555555">Reduced duplication in cataloguing</text>

  <!-- ── FOOTER NAVIGATION ───────────────────────────────── -->
  <line x1="24" y1="3856" x2="366" y2="3856" stroke="#E5E5E5" stroke-width="1"/>
  <text x="24" y="3886" font-size="12" fill="#555555">← Previous project</text>
  <text x="366" y="3886" font-size="12" fill="#555555" text-anchor="end">Next project →</text>

</svg>
